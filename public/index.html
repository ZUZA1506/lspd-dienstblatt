<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Cache-Control" content="no-store">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>LSPD Dienstblatt</title>
    <link rel="icon" type="image/png" href="/lspd-logo.png?v=20260515-1">
    <link rel="stylesheet" href="/styles.css?v=20260503-3">
  </head>
  <body>
    <div id="loginView" class="login-shell">
      <form id="loginForm" class="login-panel">
        <div>
          <p class="eyebrow">LSPD Intern</p>
          <h1>LSPD Dienstblatt</h1>
        </div>
        <label>
          Name
          <input id="loginName" autocomplete="username" placeholder="Admin Direktion" required>
        </label>
        <label>
          Passwort
          <input id="loginPassword" type="password" autocomplete="current-password" placeholder="LSPD12345" required>
        </label>
        <button type="submit" class="primary-btn">Einloggen</button>
        <p id="loginError" class="form-error"></p>
      </form>
    </div>

    <div id="appView" class="app-shell hidden">
      <aside class="sidebar">
        <div class="brand">
          <img src="/lspd-logo.png?v=20260515-1" alt="LSPD">
          <strong>Dienstblatt</strong>
        </div>
        <div class="profile-card"></div>
        <nav id="navigation" class="navigation"></nav>
        <div class="sidebar-footer">
          <button id="logoutBtn" class="logout-tab" type="button">
            <span class="nav-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg></span>
            <span>Abmelden</span>
          </button>
        </div>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div id="headerTitleBlock" class="header-title-block">
            <span id="headerIcon" class="header-icon hidden"></span>
            <p id="rankLine" class="eyebrow"></p>
            <h2 id="pageTitle">Dienstblatt</h2>
          </div>
          <div class="top-actions">
            <span id="devModeBanner" class="devmode-chip hidden"></span>
            <span id="serviceStatus" class="service-pill off">Nicht im Dienst</span>
          </div>
        </header>
        <section id="content" class="content"></section>
      </main>
    </div>

    <div id="notifyRoot" class="notify-root" aria-live="polite" aria-atomic="true"></div>
    <div id="modalRoot" class="modal-root hidden"></div>
    <script src="/app.js?v=20260503-3"></script>
  </body>
</html>
